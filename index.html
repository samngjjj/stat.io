            { id: "vip-8", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "吳季有", title: "長官/老師", role: "長官/老師" },
            { id: "vip-9", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "陶靖霖", title: "長官/老師", role: "長官/老師" },
            { id: "vip-10", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "曾明怡", title: "長官/老師", role: "長官/老師" },
            { id: "vip-11", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "賴韋伶", title: "長官/老師", role: "長官/老師" },
            { id: "vip-12", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "林淑嘉", title: "長官/老師", role: "長官/老師" },
            { id: "vip-13", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "鄭志蓉 Miranda", title: "長官/老師", role: "長官/老師" },
            { id: "vip-14", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "蘇敬雯 Gina", title: "長官/老師", role: "長官/老師" },
            { id: "vip-15", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "滕柏翰 Bob", title: "長官/老師", role: "長官/老師" },
            { id: "vip-16", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "劉益慈 Ada", title: "長官/老師", role: "長官/老師" },
            { id: "vip-17", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "Joyce", title: "長官/老師", role: "外賓" },
            { id: "vip-18", type: "vip", university: "長官/評審", groupNo: "VIP", teamName: "長官/評審", name: "Thomas", title: "長官/老師", role: "外賓" },
        ];

        let isSupabaseConnected = false;
        let activeTab = 'team'; // 'team' | 'vip'
        let statusFilter = 'all'; // 'all' | 'checked' | 'unchecked'
        let checkInStates = {};

        const LOCAL_STORAGE_KEY = 'sys_2026_checkin_state';

        async function initializeDatabase() {
            const statusEl = document.getElementById('connection-status');

            // Load local persistence backup
            loadLocalStorageState();

            try {
                // Fetch checkin data from Supabase
                const { data, error } = await supabase.from('checkins').select('*');
                if (error) throw error;

                let loadedStates = {};
                if (data) {
                    data.forEach(row => {
                        loadedStates[row.id] = {
                            checkedIn: row.checked_in,
                            timestamp: row.timestamp,
                            updatedBy: row.updated_by
                        };
                    });
                }

                checkInStates = loadedStates;
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(checkInStates));

                isSupabaseConnected = true;
                statusEl.innerHTML = "已連線至 Supabase 實時資料庫 (免登入)";
                statusEl.className = "text-xs text-emerald-400 flex items-center justify-center gap-1.5";

                renderUI();
                setupRealtimeSync();

            } catch (error) {
                console.error("Supabase connection failed:", error);
                statusEl.innerHTML = "連線異常 (載入本地備份資料)";
                statusEl.className = "text-xs text-red-400 flex items-center justify-center gap-1.5";
                renderUI();
            }
        }

        let realtimeChannel;
        function setupRealtimeSync() {
            realtimeChannel = supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'checkins' }, (payload) => {
                    const row = payload.new;
                    const oldRow = payload.old;
                    const eventType = payload.eventType;

                    let newStates = { ...checkInStates };

                    if (eventType === 'DELETE') {
                        const deletedId = oldRow.id;
                        newStates[deletedId] = {
                            checkedIn: false,
                            timestamp: null,
                            updatedBy: null
                        };
                    } else if (row) {
                        newStates[row.id] = {
                            checkedIn: row.checked_in,
                            timestamp: row.timestamp,
                            updatedBy: row.updated_by
                        };
                    }

                    // Display notifications on new check-ins
                    detectAndAnnounceChanges(newStates);

                    checkInStates = newStates;
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(checkInStates));
                    renderUI();
                })
                .subscribe();
        }

        function loadLocalStorageState() {
            const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (raw) {
                try {
                    checkInStates = JSON.parse(raw);
                } catch(e) {
                    checkInStates = {};
                }
            }
        }

        function detectAndAnnounceChanges(newStates) {
            for (const [id, data] of Object.entries(newStates)) {
                const oldData = checkInStates[id];
                if (data.checkedIn && (!oldData || !oldData.checkedIn)) {
                    const person = baseRoster.find(p => p.id === id);
                    if (person) {
                        showToast(`🎉 ${person.name} (${person.university}) 剛剛完成簽到！`, "success");
                    }
                }
            }
        }

        function showToast(message, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = "bg-slate-900/90 text-slate-100 border-l-4 border-indigo-500 shadow-2xl glass-card";
            if (type === "success") bgClass = "bg-emerald-950/95 border border-emerald-500/30 text-emerald-200 shadow-lg shadow-emerald-500/10";
            
            toast.className = `${bgClass} flex items-center gap-3 p-3.5 rounded-xl text-xs font-medium transition-all duration-300 opacity-0 transform translate-y-3 pointer-events-auto w-full`;
            toast.innerHTML = `
                <i class="fa-solid fa-circle-check text-emerald-400 text-sm shrink-0"></i>
                <div class="leading-relaxed truncate">${message}</div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-3'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-10px]');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        window.switchTab = function(tabName) {
            activeTab = tabName;
            const teamBtn = document.getElementById('tab-btn-team');
            const vipBtn = document.getElementById('tab-btn-vip');

            if (tabName === 'team') {
                teamBtn.className = "flex-1 text-center py-2.5 rounded-lg text-xs font-bold transition-all bg-indigo-600 text-white shadow-md";
                vipBtn.className = "flex-1 text-center py-2.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white";
            } else {
                vipBtn.className = "flex-1 text-center py-2.5 rounded-lg text-xs font-bold transition-all bg-indigo-600 text-white shadow-md";
                teamBtn.className = "flex-1 text-center py-2.5 rounded-lg text-xs font-bold transition-all text-slate-400 hover:text-white";
            }
            renderUI();
        };

        window.setStatusFilter = function(filter) {
            statusFilter = filter;
            const buttons = ['all', 'checked', 'unchecked'];
            buttons.forEach(btn => {
                const el = document.getElementById(`filter-btn-${btn}`);
                if (btn === filter) {
                    el.className = "flex-1 text-center py-2 rounded-lg text-xs font-semibold bg-white/10 text-white transition-all";
                } else {
                    el.className = "flex-1 text-center py-2 rounded-lg text-xs font-semibold text-slate-400 hover:text-white transition-all";
                }
            });
            renderUI();
        };

        window.applyFilters = function() {
            renderUI();
        };

        function renderUI() {
            const container = document.getElementById('roster-list');
            const searchVal = document.getElementById('search-input').value.trim().toLowerCase();

            // 1. Filter by Tab (team or vip)
            const tabRoster = baseRoster.filter(p => p.type === activeTab);

            // 2. Filter by Status (all, checked, unchecked)
            const statusFiltered = tabRoster.filter(p => {
                const isChecked = checkInStates[p.id]?.checkedIn || false;
                if (statusFilter === 'checked') return isChecked;
                if (statusFilter === 'unchecked') return !isChecked;
                return true;
            });

            // 3. Filter by Search Query
            const finalRoster = statusFiltered.filter(p => {
                if (!searchVal) return true;
                return p.name.toLowerCase().includes(searchVal) ||
                       p.university.toLowerCase().includes(searchVal) ||
                       p.teamName.toLowerCase().includes(searchVal) ||
                       p.title.toLowerCase().includes(searchVal);
            });

            // Update stats
            updateStats();

            // Render Roster list
            if (finalRoster.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-500 border border-dashed border-white/5 rounded-2xl bg-slate-900/10">
                        <i class="fa-regular fa-face-frown text-xl mb-2 text-slate-600"></i>
                        <p class="text-xs">查無符合搜尋條件的名單</p>
                    </div>
                `;
                return;
            }

            if (activeTab === 'vip') {
                container.innerHTML = finalRoster.map(p => renderVipCard(p)).join('');
            } else {
                // Group students by team
                const grouped = {};
                finalRoster.forEach(p => {
                    if (!grouped[p.groupNo]) {
                        grouped[p.groupNo] = {
                            groupNo: p.groupNo,
                            university: p.university,
                            teamName: p.teamName,
                            members: []
                        };
                    }
                    grouped[p.groupNo].members.push(p);
                });

                container.innerHTML = Object.values(grouped).map(team => renderTeamCard(team)).join('');
            }
        }

        function renderVipCard(vip) {
            const isChecked = checkInStates[vip.id]?.checkedIn || false;
            const timeStr = isChecked && checkInStates[vip.id]?.timestamp ? formatTimeOnly(checkInStates[vip.id].timestamp) : '';
            const initials = vip.name.slice(-2);

            return `
                <div class="glass-card rounded-2xl p-4 flex items-center justify-between border ${isChecked ? 'border-emerald-500/20 bg-emerald-950/5' : 'border-white/5'}">
                    <div class="flex items-center gap-3">
                        <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-amber-600 to-orange-600 text-white flex items-center justify-center font-bold text-xs shrink-0">
                            ${initials}
                        </div>
                        <div>
                            <span class="font-bold text-white text-sm">${escapeHTML(vip.name)}</span>
                            <span class="text-[10px] text-slate-400 block mt-0.5">${escapeHTML(vip.role)} | ${escapeHTML(vip.university)}</span>
                        </div>
                    </div>
                    <div>
                        ${isChecked ? `
                            <div class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 px-2.5 py-1 rounded-lg text-xs font-semibold flex items-center gap-1.5">
                                <i class="fa-solid fa-circle-check text-[10px]"></i>
                                <span>已簽到 ${timeStr}</span>
                            </div>
                        ` : `
                            <div class="bg-slate-900/80 border border-white/5 text-slate-400 px-2.5 py-1 rounded-lg text-xs font-medium flex items-center gap-1.5">
                                <i class="fa-regular fa-clock text-[10px]"></i>
                                <span>未簽到</span>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderTeamCard(team) {
            const totalMembers = baseRoster.filter(p => p.type === 'team' && p.groupNo === team.groupNo).length;
            const checkedMembers = team.members.filter(m => checkInStates[m.id]?.checkedIn).length;
            const isTeamAllChecked = team.members.every(m => checkInStates[m.id]?.checkedIn === true) && (team.members.length === totalMembers);

            return `
                <div class="glass-card rounded-2xl p-4 border border-white/5 relative overflow-hidden">
                    ${isTeamAllChecked ? `
                        <div class="absolute top-0 right-0 bg-emerald-500/20 text-emerald-400 text-[10px] font-bold px-2 py-0.5 rounded-bl border-l border-b border-emerald-500/20">全員到齊</div>
                    ` : ''}
                    <div class="border-b border-white/5 pb-2 mb-3">
                        <span class="text-[10px] font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded border border-indigo-500/20">第 ${team.groupNo} 組</span>
                        <h3 class="font-bold text-white text-sm mt-1 leading-snug">${escapeHTML(team.teamName)}</h3>
                        <p class="text-xs text-slate-400 mt-1 flex items-center gap-1">
                            <i class="fa-solid fa-graduation-cap text-indigo-400"></i> ${escapeHTML(team.university)}
                        </p>
                    </div>
                    <div class="space-y-2">
                        ${team.members.map(m => {
                            const isChecked = checkInStates[m.id]?.checkedIn || false;
                            const timeStr = isChecked && checkInStates[m.id]?.timestamp ? formatTimeOnly(checkInStates[m.id].timestamp) : '';
                            return `
                                <div class="flex items-center justify-between py-1.5 border-b border-white/5 last:border-0 last:pb-0">
                                    <div class="flex items-center gap-2">
                                        <span class="text-slate-200 text-sm font-semibold">${escapeHTML(m.name)}</span>
                                        ${m.role === '組長' ? '<span class="text-[9px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-1 py-0.1 rounded shrink-0">組長</span>' : ''}
                                        <span class="text-[10px] text-slate-500 truncate max-w-[120px]">${escapeHTML(m.title)}</span>
                                    </div>
                                    <div>
                                        ${isChecked ? `
                                            <span class="text-[10px] font-bold text-emerald-400 flex items-center gap-1">
                                                <i class="fa-solid fa-check text-[9px]"></i> 已簽到 ${timeStr}
                                            </span>
                                        ` : `
                                            <span class="text-[10px] text-slate-500 flex items-center gap-1">
                                                <i class="fa-regular fa-circle text-[9px]"></i> 未簽到
                                            </span>
                                        `}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function updateStats() {
            const studentRoster = baseRoster.filter(p => p.type === 'team');
            const vipRoster = baseRoster.filter(p => p.type === 'vip');

            const checkedStudents = studentRoster.filter(p => checkInStates[p.id]?.checkedIn).length;
            const checkedVips = vipRoster.filter(p => checkInStates[p.id]?.checkedIn).length;

            const allTeamIDs = [...new Set(studentRoster.map(p => p.groupNo))];
            let completedTeams = 0;
            allTeamIDs.forEach(groupNo => {
                const members = studentRoster.filter(p => p.groupNo === groupNo);
                if (members.every(m => checkInStates[m.id]?.checkedIn)) {
                    completedTeams++;
                }
            });

            document.getElementById('stat-students').textContent = `${checkedStudents} / ${studentRoster.length}`;
            document.getElementById('stat-vips').textContent = `${checkedVips} / ${vipRoster.length}`;
            document.getElementById('stat-teams').textContent = `${completedTeams} / ${allTeamIDs.length}`;

            const totalPeople = baseRoster.length;
            const totalChecked = baseRoster.filter(p => checkInStates[p.id]?.checkedIn).length;
            const percent = totalPeople > 0 ? Math.round((totalChecked / totalPeople) * 100) : 0;

            document.getElementById('progress-percent').textContent = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
        }

        function formatTimeOnly(ms) {
            const date = new Date(ms);
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        window.onload = function() {
            initializeDatabase();
        };
    </script>
</body>
